name: Scan internships

on:
  workflow_call:
    inputs:
      upstream_sha:
        required: false
        type: string
        default: ""
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: scan-internships
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    if: github.repository == 'AnushSonone/job-apply-assistant'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - run: pip install -r requirements-ci.txt pytest

      - name: Unit tests
        run: pytest tests/ -v

      - name: Run scan (alert-only)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_PATH: job_assistant/data/scanner.db
          SCANNER_DB_PATH: job_assistant/data/scanner.db
          UPSTREAM_SHA: ${{ inputs.upstream_sha }}
          CI: "true"
        run: python -m job_assistant scan

      - name: Commit scanner state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(scanner): update state [skip ci]"
          file_pattern: job_assistant/data/scanner.db
          skip_dirty_check: true
