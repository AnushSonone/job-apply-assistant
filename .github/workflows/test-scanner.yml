name: Test scanner

on:
  push:
    branches: [main]
    paths:
      - "job_assistant/**"
      - "tests/**"
      - "requirements-ci.txt"
      - ".github/workflows/test-scanner.yml"
  pull_request:
    paths:
      - "job_assistant/**"
      - "tests/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - run: pip install -r requirements-ci.txt pytest

      - name: Unit tests
        run: pytest tests/ -v

  live-dry-run:
    runs-on: ubuntu-latest
    needs: unit
    if: github.repository == 'AnushSonone/job-apply-assistant'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - run: pip install -r requirements-ci.txt

      - name: Dry-run scan (no Telegram; no-op if upstream unchanged)
        env:
          SCAN_DRY_RUN: "true"
          DATABASE_PATH: job_assistant/data/scanner.db
          SCANNER_DB_PATH: job_assistant/data/scanner.db
        run: |
          python -m job_assistant scan
          echo "Scan finished — alerts only when upstream SHA changed since last commit."
