name: Check upstream README

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.sha.outputs.changed }}
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: sha
        run: |
          SHA=$(curl -sf \
            "https://api.github.com/repos/SimplifyJobs/Summer2026-Internships/commits?path=README-Off-Season.md&sha=dev&per_page=1" \
            | jq -r '.[0].sha')
          STORED=$(sqlite3 job_assistant/data/scanner.db \
            "SELECT value FROM sync_state WHERE key='upstream_sha' LIMIT 1;" 2>/dev/null || echo "")
          if [ -z "$STORED" ] || [ "$SHA" != "$STORED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  scan:
    needs: check
    if: needs.check.outputs.changed == 'true'
    permissions:
      contents: write
      actions: write
    uses: ./.github/workflows/scan-internships.yml
    secrets: inherit
    with:
      upstream_sha: ${{ needs.check.outputs.sha }}
